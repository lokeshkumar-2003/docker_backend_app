version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: myapp
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  app:
    build: ./backend
    container_name: node_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://admin:password123@mongodb:27017/myapp?authSource=admin
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app          # mirrors your local code into container
      - /app/node_modules        # keeps container's node_modules intact
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge